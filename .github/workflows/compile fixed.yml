name: iOS Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build
        run: |
          cd "Flappy Bird"
          xcodebuild clean build -workspace FlappyBird.xcworkspace -scheme FlappyBird -configuration Release

      - name: Archive
        run: |
          cd "Flappy Bird"
          xcodebuild -archivePath build/FlappyBird.xcarchive -workspace FlappyBird.xcworkspace -scheme FlappyBird -configuration Release archive

      - name: Export IPA
        run: |
          cd "Flappy Bird"
          mkdir -p build/ipa
          xcodebuild -exportArchive -archivePath build/FlappyBird.xcarchive -exportPath build/ipa -exportOptionsPlist ExportOptions.plist

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: "Flappy Bird/build/ipa/*.ipa"
          tag_name: build-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

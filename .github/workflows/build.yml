name: Root Dizine Unzip İşlemi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unzip-to-root:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Kontrol Et (Checkout)
        uses: actions/checkout@v4

      # ZIP dosyasını doğrudan ana dizine (root) çıkarır
      - name: Arşivi Root'a Çıkar
        run: |
          # 'dosya.zip' yerine kendi dosya adını yaz
          # -o parametresi, aynı isimde dosyalar varsa sormadan üzerine yazar (overwrite)
          unzip -o Files.zip -d .
          echo "Dosyalar root dizinine başarıyla çıkarıldı."

      # Çıkarılan dosyaları doğrulamak için listele
      - name: Root İçeriğini Göster
        run: ls -la

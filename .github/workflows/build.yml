name: Unzip ve Repoya Kaydet

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest
    # GitHub'a dosya yazabilmesi için gerekli izinler
    permissions:
      contents: write

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4
        with:
          # Değişiklikleri geri göndermek için full geçmişi al
          fetch-depth: 0

      - name: Arşivi Root'a Çıkar
        run: |
          # 'dosya.zip' yerine kendi dosyanızın adını yazın
          unzip -o Files.zip -d .
          echo "Dosyalar açıldı."

      - name: Değişiklikleri Commit Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Yeni dosyaları ekle
          git add .
          
          # Eğer değişen bir şey varsa commit et ve gönder
          if git diff --staged --quiet; then
            echo "Değişen bir şey yok, push edilmedi."
          else
            git commit -m "Otomatik unzip: Dosyalar root dizinine çıkarıldı"
            git push
          fi

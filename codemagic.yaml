workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build
        script: |
          cd "Flappy Bird"
          xcodebuild -scheme "Flappy Bird" -configuration Release build -project "Flappy Bird.xcodeproj"
    artifacts:
      - build/ios/ipa/*.ipa
